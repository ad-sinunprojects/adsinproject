<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ProjectFlow — מערכת ניהול פרויקטים</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Hebrew:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Hebrew:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4f8;--bg2:#ffffff;--bg3:#f8fafc;--bg4:#eef2f7;
  --b:#cbd5e1;--b2:#94a3b8;--b3:#e2e8f0;
  --t:#0f172a;--t2:#334155;--t3:#64748b;--t4:#64748b;
  --blue:#2563eb;--blue2:#1d4ed8;--blue3:#1e40af;
  --green:#16a34a;--green2:#15803d;
  --red:#dc2626;--red2:#b91c1c;
  --amber:#d97706;--amber2:#b45309;
  --purple:#7c3aed;--purple2:#6d28d9;
  --teal:#0d9488;
  --r4:4px;--r6:6px;--r8:8px;--r10:10px;--r12:12px;--r16:16px;
  --shadow:0 4px 24px rgba(0,0,0,.1);
  --shadow-sm:0 2px 8px rgba(0,0,0,.08);
}
body{font-family:'IBM Plex Sans Hebrew',sans-serif;font-size:13px;background:var(--bg);color:var(--t);direction:rtl;min-height:100vh;line-height:1.5;width:100%;overflow-x:hidden}
button,input,select,textarea{font-family:inherit;font-size:12px;line-height:1.4}
textarea{resize:vertical}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg3)}
::-webkit-scrollbar-thumb{background:var(--b);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--b3)}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;min-height:100vh;width:100%}
.main{padding:20px;flex:1;width:100%;box-sizing:border-box}
.main-full{padding:16px 20px;flex:1;width:100%;min-width:0;box-sizing:border-box}

/* ── TOPBAR ── */
.topbar{
  width:100%;background:rgba(255,255,255,.95);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--b);
  padding:0 16px;height:54px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
  box-shadow:0 2px 20px rgba(0,0,0,.3);
}
.logo{font-weight:700;font-size:14px;color:#f8fafc;display:flex;align-items:center;gap:8px;white-space:nowrap;letter-spacing:-.3px}
.logo-icon{width:28px;height:28px;background:linear-gradient(135deg,var(--blue),var(--purple2));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px}
.nav{display:flex;gap:1px;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}

/* ── BUTTONS ── */
.btn{
  padding:6px 12px;border:none;border-radius:var(--r6);
  background:transparent;color:var(--t3);cursor:pointer;
  white-space:nowrap;transition:all .15s;font-weight:400;
  display:inline-flex;align-items:center;gap:5px;
}
.btn:hover{background:rgba(255,255,255,.06);color:var(--t2)}
.btn.act{background:rgba(59,130,246,.15);color:var(--blue);font-weight:500;border:1px solid rgba(59,130,246,.25)}
.btn.pri{background:var(--blue);color:#fff;font-weight:500}
.btn.pri:hover{background:var(--blue2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(59,130,246,.35)}
.btn.pri:active{transform:translateY(0)}
.btn.sec{background:rgba(255,255,255,.06);color:var(--t2);border:1px solid var(--b)}
.btn.sec:hover{background:rgba(255,255,255,.1)}
.btn.dan{background:var(--red2);color:#fff;font-weight:500}
.btn.dan:hover{background:#b91c1c}
.btn.suc{background:var(--green2);color:#fff;font-weight:500}
.btn.suc:hover{background:#15803d}
.btn.sm{padding:4px 10px;font-size:11px}
.btn.xs{padding:2px 7px;font-size:11px}
.btn.icon{padding:5px;width:32px;height:32px;justify-content:center}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}

/* ── AVATAR ── */
.av{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;vertical-align:middle;letter-spacing:-.5px}

/* ── PAGE HEADER ── */
.page-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.page-title{font-size:17px;font-weight:700;color:#f8fafc;letter-spacing:-.4px}
.page-sub{font-size:28px;color:var(--t3);margin-top:2px}

/* ── CARD ── */
.card{
  background:var(--bg2);
  border:1px solid var(--b);
  border-radius:var(--r12);
  overflow:hidden;
  box-shadow:var(--shadow-sm);
}
.card-hdr{
  padding:13px 16px;
  border-bottom:1px solid var(--b3);
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,255,255,.02);
}
.card-hdr-title{font-weight:600;font-size:11px;color:#e2e8f0}

/* ── KPI ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.kpi{
  background:var(--bg4);
  border:1px solid var(--b);
  border-radius:var(--r10);
  padding:16px 18px;
  position:relative;
  overflow:hidden;
  transition:transform .2s,box-shadow .2s;
  cursor:default;
}
.kpi:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.kpi::before{content:'';position:absolute;top:0;right:0;width:3px;height:100%;border-radius:0 var(--r10) var(--r10) 0}
.kpi.blue::before{background:linear-gradient(to bottom,var(--blue),var(--blue3))}
.kpi.amber::before{background:linear-gradient(to bottom,var(--amber),var(--amber2))}
.kpi.red::before{background:linear-gradient(to bottom,var(--red),var(--red2))}
.kpi.green::before{background:linear-gradient(to bottom,var(--green),var(--green2))}
.kpi-v{font-size:26px;font-weight:700;font-family:'IBM Plex Mono',monospace;line-height:1}
.kpi-l{font-size:11px;color:var(--t3);margin-top:5px;font-weight:500}
.kpi-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:30px;opacity:.15}

/* ── TABLE ── */
table{width:100%;border-collapse:collapse}
th{
  text-align:right;padding:10px 14px;
  font-size:11px;font-weight:600;color:var(--t3);
  border-bottom:1px solid var(--b3);
  background:rgba(255,255,255,.02);
  white-space:nowrap;text-transform:uppercase;letter-spacing:.4px;
}
td{padding:11px 14px;border-bottom:1px solid rgba(30,58,95,.4);font-size:28px;vertical-align:middle}
tr.row{cursor:pointer;transition:background .1s}
tr.row:hover td{background:rgba(37,99,235,.06)}
tr.row:last-child td{border-bottom:none}
.mono{font-family:'IBM Plex Mono',monospace}

/* ── BADGES ── */
.bdg{
  display:inline-flex;align-items:center;
  padding:3px 8px;border-radius:20px;
  font-size:11px;font-weight:600;
  border:1px solid;white-space:nowrap;
  letter-spacing:.2px;
}
.bg{background:#dcfce7;color:#166534;border-color:#86efac}
.bb{background:#dbeafe;color:#1d4ed8;border-color:#93c5fd}
.br{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
.by{background:#f1f5f9;color:#475569;border-color:#cbd5e1}
.bam{background:#fef3c7;color:#92400e;border-color:#fde68a}
.bpu{background:#ede9fe;color:#5b21b6;border-color:#c4b5fd}
.bt{background:#ccfbf1;color:#115e59;border-color:#5eead4}

/* ── MODAL ── */
.mbg{
  position:fixed;inset:0;
  background:rgba(0,0,0,.7);
  backdrop-filter:blur(4px);
  z-index:100;
  display:flex;align-items:center;justify-content:center;
  padding:16px;
  animation:fadein .15s ease;
}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--bg2);
  border:1px solid var(--b2);
  border-radius:var(--r16);
  width:100%;max-width:660px;
  max-height:90vh;
  overflow-y:auto;
  display:flex;flex-direction:column;
  box-shadow:0 25px 60px rgba(0,0,0,.5);
  animation:slidein .2s ease;
}
@keyframes slidein{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal.wide{max-width:860px}
.modal.sm{max-width:460px}
.mhd{
  padding:16px 20px 12px;
  border-bottom:1px solid var(--b3);
  display:flex;align-items:flex-start;justify-content:space-between;
  flex-shrink:0;
  background:rgba(255,255,255,.02);
}
.mttl{font-size:14px;font-weight:700;color:#f8fafc;letter-spacing:-.3px}
.msub{font-size:11px;color:var(--t3);margin-top:2px}
.mbdy{padding:20px;flex:1;overflow-y:auto}
.mft{
  padding:12px 20px;
  border-top:1px solid var(--b3);
  display:flex;justify-content:flex-end;gap:8px;
  flex-shrink:0;
  background:rgba(255,255,255,.02);
}

/* ── TABS ── */
.tabs{
  display:flex;
  border-bottom:1px solid var(--b3);
  padding:0 20px;
  flex-shrink:0;
  overflow-x:auto;
  scrollbar-width:none;
  gap:2px;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  padding:10px 14px;border:none;background:transparent;
  color:var(--t3);font-size:28px;font-weight:500;
  border-bottom:2px solid transparent;cursor:pointer;
  margin-bottom:-1px;white-space:nowrap;transition:all .15s;
}
.tab:hover{color:var(--t2)}
.tab.act{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}

/* ── FORM ── */
.fld{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.fl{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.4px}
.fi{
  background:var(--bg3);
  border:1px solid var(--b);
  border-radius:var(--r8);
  padding:8px 12px;color:var(--t);
  width:100%;outline:none;
  transition:border-color .15s,box-shadow .15s;
}
.fi:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.fi:hover:not(:focus){border-color:var(--b2)}
.fi.err{border-color:var(--red);box-shadow:0 0 0 3px rgba(239,68,68,.15)}
select.fi{cursor:pointer}
.emsg{font-size:11px;color:#f87171;margin-top:2px;display:flex;align-items:center;gap:4px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* ── SEC HEADER ── */
.sec{
  font-size:11px;font-weight:700;color:var(--t3);
  text-transform:uppercase;letter-spacing:.8px;
  margin:18px 0 10px;padding-bottom:7px;
  border-bottom:1px solid var(--b3);
  display:flex;align-items:center;gap:8px;
}

/* ── ALERTS ── */
.alert{
  padding:10px 14px;border-radius:var(--r8);
  font-size:28px;margin-bottom:12px;
  border:1px solid;display:flex;align-items:flex-start;gap:8px;
  line-height:1.5;
}
.ai{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8}
.aw{background:#fffbeb;border-color:#fde68a;color:#92400e}
.ae{background:#fef2f2;border-color:#fecaca;color:#991b1b}
.aok{background:#f0fdf4;border-color:#bbf7d0;color:#166534}

/* ── TOGGLE ── */
.tog{position:relative;display:inline-block;width:36px;height:20px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.tog-sl{position:absolute;inset:0;border-radius:20px;background:var(--b2);cursor:pointer;transition:background .2s}
.tog input:checked+.tog-sl{background:var(--blue)}
.tog-sl:before{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:3px;right:3px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.tog input:checked+.tog-sl:before{transform:translateX(-16px)}

/* ── PIN ── */
.pin{
  width:48px;height:52px;text-align:center;
  font-size:28px;font-weight:700;
  border:1.5px solid var(--b);border-radius:var(--r8);
  background:var(--bg3);color:var(--t);outline:none;
  transition:border-color .15s,box-shadow .15s;
}
.pin:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.15)}

/* ── GANTT ── */
.ghdr{display:flex;height:38px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--b3)}
.glc{width:200px;flex-shrink:0;padding:0 12px;display:flex;align-items:center;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;border-left:1px solid var(--b3)}
.gtc{flex:1;position:relative;overflow:hidden;min-width:0}
.gdc{width:140px;flex-shrink:0;padding:0 10px;display:flex;align-items:center;font-size:11px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.grow{display:flex;align-items:center;height:52px;border-bottom:1px solid rgba(30,58,95,.3);transition:background .1s}
.grow:hover{background:rgba(59,130,246,.04)}
.grow:last-child{border-bottom:none}
.grl{width:200px;flex-shrink:0;padding:0 12px;border-left:1px solid var(--b3);display:flex;flex-direction:column;justify-content:center;gap:2px}
.grt{flex:1;height:100%;position:relative;overflow:hidden;min-width:0}
.grd{width:140px;flex-shrink:0;padding:0 10px;display:flex;flex-direction:column;gap:3px;justify-content:center}
.gbar{
  position:absolute;height:24px;top:50%;transform:translateY(-50%);
  border-radius:var(--r4);cursor:pointer;
  display:flex;align-items:center;overflow:hidden;z-index:3;
  transition:filter .1s,box-shadow .1s;
}
.gbar:hover{filter:brightness(1.15);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.gbar span{font-size:11px;color:rgba(255,255,255,.9);padding:0 8px;white-space:nowrap;font-weight:600;overflow:hidden}
.tline{position:absolute;top:0;bottom:0;width:2px;background:#d97706;z-index:6;pointer-events:none;box-shadow:0 0 6px #d9770644}
.tick{position:absolute;top:0;bottom:0;border-left:1px solid rgba(30,58,95,.5);display:flex;align-items:center;padding-right:5px;overflow:hidden}
.tlbl{font-size:11px;font-weight:600;color:var(--t3);font-family:'IBM Plex Mono',monospace;white-space:nowrap}
.diam{width:12px;height:12px;border-radius:2px;transform:rotate(45deg) translateX(-50%);position:absolute;top:50%;margin-top:-6px;z-index:4;cursor:pointer;box-shadow:0 2px 4px rgba(0,0,0,.3)}
.pdot{width:18px;height:18px;border-radius:50%;position:absolute;top:50%;transform:translate(-50%,-50%);z-index:4;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;font-weight:700;border:2px solid;box-shadow:0 2px 4px rgba(0,0,0,.3)}
.plbl{position:absolute;font-size:26px;color:var(--t2);white-space:nowrap;background:rgba(10,22,40,.9);padding:2px 5px;border-radius:var(--r4);pointer-events:none;z-index:3;line-height:1.3;text-align:center;top:calc(50% + 12px);transform:translateX(-50%);border:1px solid var(--b)}
.gftr{padding:10px 14px;border-top:1px solid var(--b3);display:flex;gap:16px;background:rgba(255,255,255,.02);flex-wrap:wrap}

/* ── NOTES ── */
.note{
  background:var(--bg3);
  border-radius:var(--r8);
  padding:10px 14px;margin-bottom:10px;
  border:1px solid var(--b3);
  border-right:3px solid var(--blue2);background:#f0f7ff;
  position:relative;
}
.note-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.note-user{font-size:11px;font-weight:700;color:#60a5fa}
.note-date{font-size:11px;color:var(--t4)}
.note-text{font-size:28px;line-height:1.5;color:var(--t2)}

/* ── PROC CARD ── */
.pcard{
  background:var(--bg3);
  border-radius:var(--r10);
  padding:12px 14px;margin-bottom:10px;
  border:1px solid var(--b);
  transition:border-color .15s;
}

/* ── APPROVAL ROW ── */
.arow{
  background:var(--bg4);
  border:1px solid var(--b);
  border-radius:var(--r10);
  padding:14px 16px;margin-bottom:10px;
  display:flex;align-items:center;gap:12px;
  flex-wrap:wrap;
  transition:border-color .2s,box-shadow .2s;
}
.arow:hover{border-color:var(--b2);box-shadow:var(--shadow-sm)}

/* ── UPLOAD ZONE ── */
.upz{
  border:2px dashed var(--b2);border-radius:var(--r10);
  padding:28px 20px;text-align:center;cursor:pointer;
  background:var(--bg3);transition:all .2s;
}
.upz:hover,.upz.drag{border-color:var(--blue);background:rgba(59,130,246,.06);box-shadow:inset 0 0 0 1px rgba(59,130,246,.15)}

/* ── STEPPER ── */
.step-dot{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;font-weight:700;flex-shrink:0;border:2px solid;
  transition:all .2s;
}

/* ── USER CHIP ── */
.uchip{
  display:flex;align-items:center;gap:6px;
  padding:5px 10px 5px 6px;
  border:1px solid var(--b);border-radius:24px;
  cursor:pointer;font-size:28px;color:var(--t3);
  background:rgba(255,255,255,.03);
  transition:all .15s;white-space:nowrap;
}
.uchip:hover{border-color:var(--b2);background:rgba(255,255,255,.06)}

/* ── LOG ROW ── */
.log-row{
  display:flex;gap:12px;align-items:flex-start;
  padding:10px 0;border-bottom:1px solid rgba(30,58,95,.4);
}
.log-row:last-child{border-bottom:none}
.log-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}


/* ── TOOLTIP ── */
.tt{
  position:fixed;z-index:999;pointer-events:none;
  background:rgba(255,255,255,.98);
  border:1px solid var(--b2);
  border-radius:var(--r10);
  padding:12px 14px;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  min-width:180px;max-width:280px;
  font-size:28px;line-height:1.5;
  color:var(--t);
  opacity:0;transition:opacity .12s;
  backdrop-filter:blur(8px);
  box-shadow:0 8px 32px rgba(0,0,0,.15);
}
.tt.show{opacity:1}
.tt-title{font-weight:700;font-size:11px;color:#0f172a;margin-bottom:6px;border-bottom:1px solid var(--b3);padding-bottom:5px}
.tt-row{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:3px}
.tt-lbl{color:#64748b;font-size:11px}
.tt-val{font-weight:600;color:#0f172a;font-family:'IBM Plex Mono',monospace;font-size:11px}
.tt-val.ok{color:#4ade80}
.tt-val.err{color:#f87171}
.tt-val.warn{color:#fbbf24}
.tt-chip{display:inline-flex;padding:1px 6px;border-radius:10px;font-size:11px;font-weight:600;margin-top:4px}

/* ── SPINNER ── */
.spin{width:40px;height:40px;border:3px solid var(--b);border-top-color:var(--blue);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── CF BADGE ── */
.cfbdg{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);border-radius:var(--r4);padding:3px 8px;font-size:11px;color:#f87171}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at top right,rgba(37,99,235,.06) 0%,transparent 60%)}
.login-box{
  background:var(--bg2);
  border:1px solid var(--b);
  border-radius:var(--r16);
  padding:40px 36px;
  width:100%;max-width:400px;
  box-shadow:var(--shadow);
  position:relative;overflow:hidden;
}
.login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(to right,var(--blue),var(--purple2))}
.login-logo{font-size:11px;font-weight:800;color:#f8fafc;margin-bottom:4px;display:flex;align-items:center;gap:10px;letter-spacing:-.5px}
.login-sub{font-size:11px;color:var(--t3);margin-bottom:28px}
.saving-pulse{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t3)}
.saving-dot{width:6px;height:6px;border-radius:50%;background:var(--blue2);animation:pulse 1s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── PROGRESS BAR ── */

const addD=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};
const diffD=(a,b)=>{const da=toD(a),db=toD(b);if(!da||!db)return 0;const u=d=>Date.UTC(d.getFullYear(),d.getMonth(),d.getDate());return Math.round((u(db)-u(da))/86400000);};
const isWE=d=>new Date(d).getDay()===5||new Date(d).getDay()===6;
const nextBiz=d=>{let r=addD(d,1);while(isWE(r))r=addD(r,1);return r;};
const bizEnd=(s,h)=>{let d=new Date(s),r=Math.ceil((h||1)/8);while(r>0){d=addD(d,1);if(!isWE(d))r--;}return d;};
const toD=v=>{if(!v)return null;if(v instanceof Date)return new Date(v);if(typeof v==='string')return new Date(v);if(v.toDate)return v.toDate();if(v.seconds)return new Date(v.seconds*1000);return null;};
const toISO=d=>{const dt=toD(d);return dt?dt.toISOString().split('T')[0]:'';};
const fmtD=d=>{const dt=toD(d);if(!dt||isNaN(dt))return'—';return`${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}/${dt.getFullYear()}`;};
const fmtS=d=>{const dt=toD(d);if(!dt||isNaN(dt))return'';return String(dt.getDate()).padStart(2,'0')+'/'+String(dt.getMonth()+1).padStart(2,'0');};
const fmtTS=d=>{const dt=toD(d);if(!dt||isNaN(dt))return'—';return`${fmtD(dt)} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;};
const pct=(d,vs,ve)=>{const dt=toD(d);if(!dt)return-999;return((dt-vs)/(ve-vs))*100;};
const wpct=(s,e,vs,ve)=>{const ds=toD(s),de=toD(e);if(!ds||!de)return 0;const cs=Math.max(ds,vs),ce=Math.min(de,ve);return Math.max(0,((ce-cs)/(ve-vs))*100);};

const barSt=(p,t)=>{const e=toD(t==='planning'?p.planEnd:p.prodEnd),a=toD(t==='planning'?p.actualPlanEnd:p.actualProdEnd),s=toD(t==='planning'?p.planStart:p.prodStart);if(a)return'done';if(e&&e<TODAY)return'overdue';if(s&&s>TODAY)return'future';return'active';};
const hasCf=(p,s,e,t)=>{const eid=t==='planning'?p.engineerId:p.prodManagerId;if(!eid)return false;return S.projects.filter(x=>pid(x)!==pid(p)&&(t==='planning'?x.engineerId===eid:x.prodManagerId===eid)).some(x=>{const xs=toD(t==='planning'?x.planStart:x.prodStart),xe=toD(t==='planning'?x.planEnd:x.prodEnd);return xs&&xe&&s<=xe&&e>=xs;});};

// ── Check daily alerts (overdue + upcoming) ──
async function checkDailyAlerts(){
  const tomorrow=new Date(TODAY);tomorrow.setDate(tomorrow.getDate()+1);
  const tmStr=tomorrow.toDateString();
  for(const p of S.projects){
    if(p.status==='הושלם'||p.rejected)continue;
    const client=p.client||'';
    // overdue planning
    if(!p.actualPlanEnd&&p.planEnd&&toD(p.planEnd)<TODAY){
      await notifyUsers('overdue','⚠ חריגה בתכנון',
        `פרויקט ${client} חרג מתאריך סיום התכנון המתוכנן (${fmtD(p.planEnd)})`,client);
    }
    // overdue production
    if(!p.actualProdEnd&&p.prodEnd&&toD(p.prodEnd)<TODAY&&p.status!=='תכנון'){
      await notifyUsers('overdue','⚠ חריגה בייצור',
        `פרויקט ${client} חרג מתאריך סיום הייצור המתוכנן (${fmtD(p.prodEnd)})`,client);
    }
    // day before plan end
    if(!p.actualPlanEnd&&p.planEnd&&toD(p.planEnd)?.toDateString()===tmStr){
      await notifyUsers('planEnd','📅 מחר סיום תכנון',
        `מחר (${fmtD(p.planEnd)}) הוא יום סיום התכנון המתוכנן של פרויקט ${client}`,client);
    }
    // day before plan start
    if(!p.actualPlanStart&&p.planStart&&toD(p.planStart)?.toDateString()===tmStr){
      await notifyUsers('planStart','📅 מחר תחילת תכנון',
        `מחר (${fmtD(p.planStart)}) אמורה להתחיל עבודת התכנון על פרויקט ${client}`,client);
    }
    // day before prod start
    if(!p.actualProdStart&&p.prodStart&&toD(p.prodStart)?.toDateString()===tmStr){
      await notifyUsers('prodStart','📅 מחר תחילת ייצור',
        `מחר (${fmtD(p.prodStart)}) אמורה להתחיל עבודת הייצור של פרויקט ${client}`,client);
    }
    // procurement missing date
    const missingProc=(p.procurement||[]).filter(i=>!i.cancelled&&!i.arrived&&!i.expected);
    if(missingProc.length){
      await notifyUsers('procMissing','📦 רכש ללא תאריך',
        `פרויקט ${client} — ${missingProc.length} אביזרים ללא תאריך אספקה: ${missingProc.map(i=>i.name).join(', ')}`,client);
    }
  }
}

function serProj(p){
  const{_fid,...d}=p;
  const ser=v=>{
    if(v===undefined||v===null)return null;
    if(v instanceof Date)return v.toISOString();
    if(Array.isArray(v))return v.map(i=>{
      if(!i||typeof i!=='object')return i;
      return Object.fromEntries(Object.entries(i).map(([k,vv])=>[k,vv instanceof Date?vv.toISOString():vv??null]));
    });
    return v;
  };
  return Object.fromEntries(Object.entries(d).map(([k,v])=>[k,ser(v)]));
}

}

// ── AUTO STATUS ───────────────────────────────────────────────
function computeAutoStatus(p){
  // Only override stored status in clear-cut cases based on actual dates
  // 1. Install done → הושלם
  if(p.actualInstallDate)return'הושלם';
  // 2. Prod done but status still shows ייצור → ממתין להתקנה
  if(p.actualProdEnd&&(p.status==='ייצור'||p.status==='רכש'))return'ממתין להתקנה';
  // 3. Plan done but status still shows תכנון → ממתין לייצור
  if(p.actualPlanEnd&&p.status==='תכנון')return'ממתין לייצור';
  // 4. Newly approved (status not yet updated from old 'תכנון' default)
  //    Only if plan hasn't actually started (no actualPlanStart)
  if(p.approved&&!p.actualPlanStart&&!p.actualPlanEnd&&
    (p.status==='תכנון'||!p.status)){
    // Check if planStart is in the future → waiting
    const ps=toD(p.planStart);
    if(!ps||ps>TODAY)return'ממתין לתכנון';
    // planStart passed but no actualPlanStart recorded → still waiting (user didn't click button)
    // Don't assume they started - they need to click the button
    return'ממתין לתכנון';
  }
  // 5. Trust stored status
  return p.status||'תכנון';
}

// Compute waiting days for a status
function waitingDays(p){
  // Use computed status, not stored status
  const s=computeAutoStatus(p);
  const now=TODAY;
  if(s==='ממתין לתכנון'){
    const approvedDate=toD(p.approvedDate||p.approvedAt);
    if(approvedDate)return diffD(approvedDate,now);
    // Fallback: days since project was created (first note)
    const created=toD(p.notes?.[0]?.date);
    if(created)return diffD(created,now);
  }
  if(s==='ממתין לייצור'&&p.actualPlanEnd){
    return diffD(p.actualPlanEnd,now);
  }
  if(s==='ממתין להתקנה'&&p.actualProdEnd){
    return diffD(p.actualProdEnd,now);
  }
  return null;
}

      if(d.pmaster)try{const pm=JSON.parse(d.pmaster);if(Array.isArray(pm))S.pmaster=pm;}catch(e){}
      // Load Brevo key securely from Firebase
      if(d.brevoKey){S.settings=S.settings||{};S.settings.brevoKey=d.brevoKey;BREVO_API_KEY=d.brevoKey;}
    }
  }catch(e){console.error('fbLoadAll',e);}
  // Sync status for existing projects based on actual dates
  S.projects=S.projects.map(p=>{
    const computed=computeAutoStatus(p);
    // debug: console.log('STATUS SYNC:',p.client,'computed:',computed);
    if(computed!==p.status){
      const updated={...p,status:computed};
      fbSaveProj(updated);
      return updated;
    }
    return p;
  });
}
// Save queue to prevent rapid concurrent saves
const _saveQ={};
function upProj(id,changes){
  S.projects=S.projects.map(p=>{if(pid(p)!==id)return p;return{...p,...changes};});
  render();
  // Debounce saves: wait 400ms after last change before saving
  clearTimeout(_saveQ[id]);
  _saveQ[id]=setTimeout(()=>{
    const p=S.projects.find(x=>pid(x)===id);
    if(p)fbSaveProj(p);
  },400);
}

  }
  document.getElementById('root').innerHTML=renderLogin('טוען...',true);
  try{
    await signInWithEmailAndPassword(auth,email,pass);
    // onAuthStateChanged will handle the rest
  }catch(e){
    const msgs={
      'auth/user-not-found':'משתמש לא קיים',
      'auth/wrong-password':'סיסמא שגויה',
      'auth/invalid-email':'אימייל לא תקין',
      'auth/invalid-credential':'אימייל או סיסמא שגויים',
      'auth/too-many-requests':'יותר מדי ניסיונות — נסה שוב מאוחר יותר',
    };
    const errMsg=msgs[e.code]||'שגיאה: '+e.message;
    document.getElementById('root').innerHTML=renderLogin(errMsg);
  }
}

  await logAction('logout');
  await signOut(auth);
}

// ── GANTT ─────────────────────────────────────────────────────
function renderGantt(){
  const{start:vs,end:ve}=getVR();
  const tp=pct(TODAY,vs,ve),tiv=tp>=0&&tp<=100;
  const fil=S.projects.filter(p=>S.fe==='all'||p.engineerId===S.fe);
  let ticks='';
  if(S.vm==='week'){
    const days=diffD(vs,ve)+1;
    for(let i=0;i<days;i++){const d=addD(vs,i),pp=(i/days)*100,w=(1/days)*100,isT=d.toDateString()===TODAY.toDateString(),iw=isWE(d);
      ticks+=`<div class="tick" style="left:${pp}%;width:${w}%;background:${iw?'#f1f5f9':'transparent'}"><div style="display:flex;flex-direction:column;align-items:center;width:100%;gap:1px"><div style="font-size:10px;color:${isT?'#d97706':iw?'#94a3b8':'#64748b'}">${DH[d.getDay()]}</div><div style="font-size:10px;color:${isT?'#d97706':iw?'#94a3b8':'#64748b'};font-family:'IBM Plex Mono',monospace">${d.getDate()}</div></div></div>`;
    }
  }else{
    let mc=new Date(vs.getFullYear(),vs.getMonth(),1);
    while(mc<=ve){const me=new Date(mc.getFullYear(),mc.getMonth()+1,0),l=Math.max(0,((mc-vs)/(ve-vs))*100),r=Math.min(100,((addD(me,1)-vs)/(ve-vs))*100);
      ticks+=`<div class="tick" style="left:${l}%;width:${r-l}%"><span class="tlbl">${MONTHS[mc.getMonth()]} ${mc.getFullYear()}</span></div>`;
      mc=new Date(mc.getFullYear(),mc.getMonth()+1,1);
    }
  }
  const rows=fil.map(p=>{
    const eng=getUser(p.engineerId),pm=getUser(p.prodManagerId);
    let bars='';
    if(S.gt==='planning'||S.gt==='production'){
      const t=S.gt,bs=t==='planning'?p.planStart:p.prodStart,be=t==='planning'?p.planEnd:p.prodEnd;
      const st=barSt(p,t),col=BARCOL[st],l=pct(bs,vs,ve),w=wpct(bs,be,vs,ve),per=t==='planning'?eng:pm;
      if(w>0.1){
        const _tt=t==='planning'?buildPlanTT(p):buildProdTT(p);
        bars+=`<div class="gbar" style="left:${Math.max(0,l)}%;width:${w}%;background:${col}"
          onclick="openPD('${pid(p)}')"
          onmouseenter="ttShow(decodeURIComponent('${encodeURIComponent(_tt)}'),event)"
          onmousemove="ttPos(event)"
          onmouseleave="ttHide()"><span>${p.client}${per?' · '+per.name:''}</span></div>`;
      }
    }else if(S.gt==='milestones'){
      // Timeline bar
      if(p.planStart&&p.installDate){
        const sl=pct(p.planStart,vs,ve),sw=wpct(p.planStart,p.installDate,vs,ve);
        if(sw>0)bars+=`<div style="position:absolute;left:${Math.max(0,sl)}%;width:${sw}%;height:3px;background:rgba(100,116,139,.4);top:50%;transform:translateY(-50%);z-index:2;pointer-events:none;border-radius:2px"></div>`;
      }
      // Standard milestone diamonds
      const milestones=[
        {d:p.planEnd,    c:'#3b82f6',t:'planEnd',  actual:p.actualPlanEnd},
        {d:p.prodEnd,    c:'#f59e0b',t:'prodEnd',   actual:p.actualProdEnd},
        {d:p.installDate,c:'#10b981',t:'install',   actual:p.actualInstallDate},
      ];
      milestones.filter(m=>m.d).forEach(m=>{
        const mp=pct(m.d,vs,ve);
        if(mp>=-2&&mp<=102){
          const _tt=buildMilestoneTT(p,m.t);
          const isDone=!!m.actual;
          const isOverdue=!m.actual&&toD(m.d)&&toD(m.d)<TODAY;
          const borderStyle=isDone?`box-shadow:0 0 0 2px ${m.c},0 0 8px ${m.c}44`
            :isOverdue?`box-shadow:0 0 0 2px #ef4444,0 0 8px #ef444444`:'';
          const col=isOverdue?'#ef4444':m.c;
          bars+=`<div class="diam" style="left:${mp}%;background:${col};${borderStyle};width:${isDone?14:12}px;height:${isDone?14:12}px;margin-top:${isDone?-7:-6}px"
            onclick="openPD('${pid(p)}')"
            onmouseenter="ttShow(decodeURIComponent('${encodeURIComponent(_tt)}'),event)"
            onmousemove="ttPos(event)"
            onmouseleave="ttHide()">
          </div>`;
          // Actual date marker (small circle above diamond if done)
          if(m.actual){
            const ap=pct(m.actual,vs,ve);
            if(ap>=-2&&ap<=102){
              bars+=`<div style="position:absolute;left:${ap}%;top:calc(50% - 16px);transform:translateX(-50%);width:8px;height:8px;border-radius:50%;background:${m.c};border:2px solid #0f1e35;z-index:5;pointer-events:none"></div>`;
            }
          }
        }
      });
      // Procurement bottleneck diamond (latest expected item not arrived)
      const procItems=(p.procurement||[]).filter(i=>!i.cancelled&&!i.arrived&&i.expected);
      if(procItems.length){
        const bottleneck=procItems.reduce((max,i)=>(!max||toD(i.expected)>toD(max.expected))?i:max,null);
        if(bottleneck){
          const bp=pct(bottleneck.expected,vs,ve);
          if(bp>=-2&&bp<=102){
            const installDt=toD(p.installDate);
            const expDt=toD(bottleneck.expected);
            const isLate=installDt&&expDt&&expDt>installDt;
            const _ptt=buildProcTT(p,bottleneck.id);
            bars+=`<div class="diam" style="left:${bp}%;background:${isLate?'#ef4444':'#a78bfa'};box-shadow:0 0 0 2px ${isLate?'#ef4444':'#7c3aed'},0 0 8px ${isLate?'#ef444433':'#7c3aed33'};width:10px;height:10px;margin-top:-5px"
              onclick="openPD('${pid(p)}')"
              onmouseenter="ttShow(decodeURIComponent('${encodeURIComponent(_ptt)}'),event)"
              onmousemove="ttPos(event)"
              onmouseleave="ttHide()">
            </div>`;
          }
        }
      }
    }else if(S.gt==='procurement'){

    const getProcLabel=pp=>{const proc2=(pp.procurement||[]).filter(i=>!i.cancelled);if(!proc2.length)return'אין אביזרים';const arr=proc2.filter(i=>i.arrived).length;const ord=proc2.filter(i=>i.ordered&&!i.arrived).length;const tot=proc2.length;if(arr===tot)return`✓ הגיע (${tot}/${tot})`;if(arr+ord===tot)return`הוזמן (${arr+ord}/${tot})`;return`לא הוזמן (${tot-(arr+ord)}/${tot})`;};

    <div class="grd"><div style="font-size:11px;color:#475569;font-family:'IBM Plex Mono',monospace">${ds}</div>${procGanttBadge(dst,S.gt)}</div></div>`;
  }).join('');

// ── MILESTONES ────────────────────────────────────────────────
function renderMilestones(){
  const act=S.projects.filter(p=>p.status!=='הושלם'&&p.approved);

  // helper: diff from planned in days, positive=late, negative=early
  const dayDiff=(planned,actual)=>{
    const p=toD(planned),a=toD(actual||TODAY);
    if(!p)return null;
    return diffD(planned,actual||TODAY);
  };
  // cell helper: planned date + actual date + diff badge
  const msCell=(planned,actual,isBottleneck)=>{
    if(!planned)return`<td style="color:var(--t3)">—</td>`;
    const planDt=toD(planned);
    const actDt=toD(actual);
    const diff=actual?diffD(planned,actual):(!actDt&&planDt<TODAY?diffD(planned,TODAY):null);
    const overdue=!actual&&planDt&&planDt<TODAY;
    let diffHtml='';
    if(diff!==null){
      const col=diff>0?'#fca5a5':diff<0?'#86efac':'#94a3b8';
      const lbl=diff>0?'+'+diff+'י':diff<0?diff+'י':'±0';
      diffHtml=`<span class="diff-chip ${diff>0?'diff-pos':diff<0?'diff-neg':'diff-zero'}">${lbl}</span>`;
    }
    return`<td style="min-width:120px">
      <div style="display:flex;flex-direction:column;gap:3px">
        <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">
          <span style="font-family:'IBM Plex Mono',monospace;font-size:16px;color:${overdue?'#fca5a5':isBottleneck?'#fcd34d':'var(--t2)'}">${fmtD(planned)}</span>
          ${diffHtml}
          ${isBottleneck?`<span class="bdg bam" style="font-size:10px">רכש</span>`:''}
        </div>
        ${actual
          ?`<div style="display:flex;align-items:center;gap:4px"><span style="font-size:26px;color:var(--t3)">בפועל:</span><span style="font-family:'IBM Plex Mono',monospace;font-size:16px;color:#86efac">${fmtD(actual)}</span></div>`
          :overdue?`<div style="font-size:26px;color:#fca5a5">⚠ חרג</div>`:''}
      </div>
    </td>`;
  };

  return`<div class="main">
    <div class="page-hdr"><div class="page-title">ריכוז אבני דרך</div></div>
    <div style="display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap;font-size:16px;color:var(--t3)">
      <div style="display:flex;align-items:center;gap:4px"><span style="color:#fca5a5;font-weight:600">+Xי</span> = חריגה</div>
      <div style="display:flex;align-items:center;gap:4px"><span style="color:#86efac;font-weight:600">-Xי</span> = מקדים</div>
      <div style="display:flex;align-items:center;gap:4px"><span class="bdg bam" style="font-size:10px">רכש</span> = אביזר עם אספקה מאוחרת ביותר ביותר</div>
    </div>
    <div class="card" style="overflow-x:auto"><table style="min-width:900px"><thead><tr>
      <th>לקוח</th><th>הזמנה</th><th>סטטוס</th>
      <th>סיום תכנון</th><th>תחילת ייצור</th><th>סיום ייצור</th>
      <th>רכש</th><th>התקנה</th>
    </tr></thead>
    <tbody>${act.length?act.map(p=>{
      const ov=barSt(p,'planning')==='overdue'||barSt(p,'production')==='overdue';
      // find bottleneck: latest expected procurement item not yet arrived
      const procs=(p.procurement||[]).filter(i=>!i.cancelled&&!i.arrived&&i.expected);
      const bottleneck=procs.reduce((max,i)=>(!max||toD(i.expected)>toD(max.expected))?i:max,null);
      const bnDt=bottleneck?toD(bottleneck.expected):null;
      const bnAfterInstall=bnDt&&p.installDate&&bnDt>toD(p.installDate);
      return`<tr class="row" style="background:${ov?'#7f1d1d11':''}" onclick="openPD('${pid(p)}')">
        <td style="font-weight:500;white-space:nowrap">${p.client}</td>
        <td style="font-family:'IBM Plex Mono',monospace;color:var(--t3);white-space:nowrap">${p.orderNum}</td>
        <td>${sbdgP(p)}</td>
        ${msCell(p.planEnd,p.actualPlanEnd,false)}
        ${msCell(p.prodStart,p.status!=='תכנון'?p.prodStart:null,false)}
        ${msCell(p.prodEnd,p.actualProdEnd,false)}
        <td style="min-width:130px">
          ${bottleneck?`<div style="display:flex;flex-direction:column;gap:3px">
            <div style="font-size:16px;font-weight:500;color:${bnAfterInstall?'#fca5a5':'var(--t2)'}">${bottleneck.name}</div>
            <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">
              <span style="font-family:'IBM Plex Mono',monospace;font-size:16px;color:${bnAfterInstall?'#fca5a5':'var(--t3)'}">${fmtD(bottleneck.expected)}</span>
              ${bnAfterInstall?`<span class="bdg br" style="font-size:26px">⚠ אחרי התקנה</span>`:''}
            </div>
          </div>`:`<span style="color:var(--t3);font-size:16px">—</span>`}
        </td>
        ${msCell(p.installDate,p.status==='הושלם'?p.installDate:null,false)}
      </tr>`;}).join(''):`<tr><td colspan="8" style="text-align:center;padding:40px"><div style="font-size:32px;margin-bottom:10px;opacity:.4">🎯</div><div style="color:var(--t3);font-size:29px">אין פרויקטים פעילים</div></td></tr>`}
    </tbody></table></div>
  </div>`;
}

  if(!S.authUser||!S.currentUser){
    document.getElementById('root').innerHTML=renderLogin();

// ── EXCEL PARSER ─────────────────────────────────────────────
async function parseExcel(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        // Load SheetJS dynamically
        if(typeof XLSX==='undefined'){reject(new Error('SheetJS not loaded'));return;}
        const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
        resolve(extractFromWB(wb));
      }catch(err){reject(err);}
    };
    reader.onerror=reject;
    reader.readAsArrayBuffer(file);
  });
}

function extractFromWB(wb){
  // ── Find main pricing sheet ──
  const skipSheets=['חישוב','שרטוט','סקר','כלוב','תוספות','sheet'];
  let ws=null,wsName='';
  for(const name of wb.SheetNames){
    if(skipSheets.some(s=>name.toLowerCase().includes(s.toLowerCase())&&name!=='שרטוט/ תכנון'))continue;
    const sheet=wb.Sheets[name];
    const rows=XLSX.utils.sheet_to_json(sheet,{header:1,defval:null});
    const hasWork=rows.some(r=>r.some(c=>typeof c==='string'&&c.trim()==='עבודה'));
    if(hasWork){ws=rows;wsName=name;break;}
  }
  // fallback: first sheet
  if(!ws){
    const name=wb.SheetNames[0];
    ws=XLSX.utils.sheet_to_json(wb.Sheets[name],{header:1,defval:null});
    wsName=name;
  }

  // ── Find item col and qty col ──
  // Look for header row with 'פריט' and 'כמות'
  let itemCol=0,qtyCol=2;
  for(let i=0;i<Math.min(5,ws.length);i++){
    const row=ws[i];
    const pi=row.findIndex(c=>typeof c==='string'&&c.includes('פריט'));
    const qi=row.findIndex(c=>typeof c==='string'&&c.includes('כמות'));
    if(pi>=0)itemCol=pi;
    if(qi>=0)qtyCol=qi;
    if(pi>=0&&qi>=0)break;
  }

  // ── Helper: find numeric qty in row ──
  const getNum=(row,col)=>{
    const v=row[col];
    if(typeof v==='number'&&v>0)return v;
    // search nearby cols
    for(let c=Math.max(0,col-1);c<=Math.min(row.length-1,col+2);c++){
      if(typeof row[c]==='number'&&row[c]>0)return row[c];
    }
    return 0;
  };

  // ── Helper: get cell as string ──
  const str=v=>(v==null?'':String(v).trim());

  // ── Scan rows ──
  let prodHours=0,planHours=0,installWorkerDays=0;
  const installRows=[];
  const procFound=[];
  let projectDesc='';

  // Detect project name from first few rows
  for(let i=0;i<5;i++){
    const row=ws[i]||[];
    for(const cell of row){
      const s=str(cell);
      if(s.length>5&&(s.includes('שואב')||s.includes('פילטר')||s.includes('ציקלון')||s.includes('מסנן'))&&!projectDesc){
        projectDesc=s;break;
      }
    }
  }

  for(const row of ws){
    const item=str(row[itemCol]);
    if(!item)continue;
    const qty=getNum(row,qtyCol);

    // Production hours: row is exactly 'עבודה' (not עיבוד/עבודת פחח)
    if(item==='עבודה'&&qty>0&&prodHours===0){
      prodHours=qty;
    }

    // Planning hours: שרטוט / תכנון / שרטוט/ תכנון
    if((item.includes('שרטוט')||item==='תכנון'||item.includes('תכנון צנרת')===false&&item.includes('תכנון'))&&qty>0&&planHours===0){
      planHours=qty;
    }

    // Installation rows: any row starting with 'התקנת'
    if(item.startsWith('התקנת')&&qty>0){
      installRows.push({name:item,qty});
      installWorkerDays+=qty;
    }
  }

  // ── Procurement matching ──
  // Build alias map: excel row name → pmaster item name
  const aliases={
    'לוח חשמל':'ארון חשמל','ארון חשמל':'ארון חשמל',
    'מפוח':'מפוח','מפוח רגנרטיבי':'מפוח',
    'ברזים':'ברזים','ברז':'ברזים',
    'מד לחץ הפרשי':'מד לחץ הפרשי','מד לחץ':'מד לחץ הפרשי',
    'מיכל אויר':'מיכל אויר',
    'חילזון':'חילזון',
    'מזין כוכבי':'מזין כוכבי','ברז כוכבי':'מזין כוכבי',
    'מנוף':'מנוף','הובלה+הנפה':'מנוף',
    'בידוד':'בידוד',
    'משתיק קול':'משתיק קול',
  };
  const foundProcNames=new Set();
  for(const row of ws){
    const item=str(row[itemCol]).trim();
    if(!item)continue;
    const qty=getNum(row,qtyCol);
    if(qty<=0)continue;
    // Check pmaster
    for(const pm of (S.pmaster||[])){
      const pmLower=pm.toLowerCase();
      const itemLower=item.toLowerCase();
      const aliasMatch=aliases[item];
      const directMatch=itemLower===pmLower||itemLower.includes(pmLower)||pmLower.includes(itemLower);
      const resolvedName=aliasMatch||pm;
      if((directMatch||(aliasMatch&&aliasMatch===pm))&&!foundProcNames.has(pm)){
        foundProcNames.add(pm);
        procFound.push({name:pm,qty});
        break;
      }
    }
  }

  // ── Installation days = total worker-days / 2 workers ──
  const installWorkersPerDay=2; // default, user can change
  const installDays=Math.ceil(installWorkerDays/installWorkersPerDay);

  return{
    projectDesc,prodHours,planHours,
    installWorkerDays,installWorkersPerDay,installDays,
    installRows,procFound,
  };
}

async function processExcelFile(file){
  S.nf._parsed=file.name;
  S.nf._parseErr=null;
  S.nf._parsing=true;
  render();
  try{
    // Load SheetJS if not loaded
    if(typeof XLSX==='undefined'){
      await new Promise((res,rej)=>{
        const s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
        s.onload=res;s.onerror=rej;
        document.head.appendChild(s);
      });
    }
    const result=await parseExcel(file);
    // Auto-fill form fields
    if(result.projectDesc&&!S.nf.projectName){
      S.nf.projectName=result.projectDesc.slice(0,60);
    }
    if(result.prodHours>0)S.nf.prodHours=result.prodHours;
    if(result.planHours>0)S.nf.planHours=result.planHours;
    if(result.installDays>0)S.nf.installDays=result.installDays;
    if(result.installWorkersPerDay)S.nf.installWorkersPerDay=result.installWorkersPerDay;
    S.nf._installWorkerDays=result.installWorkerDays;
    S.nf._installRows=result.installRows;
    // Procurement
    if(result.procFound.length>0){
      const existing=(S.nf._pi||[]).map(i=>i.name);
      result.procFound.forEach(p=>{
        if(!existing.includes(p.name))S.nf._pi=[...(S.nf._pi||[]),{name:p.name,expected:''}];
      });
    }
    S.nf._parseResult=result;
  }catch(err){
    S.nf._parseErr='שגיאה בקריאת הקובץ: '+err.message;
    console.error(err);
  }
  S.nf._parsing=false;
  render();
}

  render();
}

const ttEl=()=>document.getElementById('tt');
function ttShow(html,e){
  const t=ttEl();if(!t)return;
  t.innerHTML=html;
  t.classList.add('show');
  ttPos(e);
}
function ttPos(e){
  const t=ttEl();if(!t)return;
  const margin=12,tw=t.offsetWidth||240,th=t.offsetHeight||120;
  let x=e.clientX+margin,y=e.clientY+margin;
  if(x+tw>window.innerWidth-8)x=e.clientX-tw-margin;
  if(y+th>window.innerHeight-8)y=e.clientY-th-margin;
  t.style.left=x+'px';t.style.top=y+'px';
}
function ttHide(){const t=ttEl();if(t)t.classList.remove('show');}
document.addEventListener('mousemove',e=>{const t=ttEl();if(t&&t.classList.contains('show'))ttPos(e);});

    const expDt=toD(item.expected);

    const ds=item.cancelled?'can':item.arrived?'arr':expDt&&expDt<TODAY&&!item.arrived?'late':'pend';
    const dlbl={arr:'הגיע',late:'באיחור',pend:'ממתין',can:'בוטל'};

        :`<div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">

            <button class="btn xs suc" onclick="doMarkArrFromSchedule('${pid(p)}','${item.id}')">✓ כן</button>

    // Late vs install warning
    const lateChip=lateVsInstall?`<span class="bdg br" style="font-size:26px">⚠ אחרי התקנה</span>`:'';

    return `<div style="background:${bgCol};border:1px solid ${borderCol};border-radius:var(--r8);padding:12px 14px;display:flex;flex-direction:column;gap:10px">
      <!-- Header row -->
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span style="font-weight:700;font-size:29px">${item.name}</span>
          <span class="bdg ${statusClass}">${dlbl[ds]}</span>
          ${lateChip}
        </div>
        ${actionBtn?`<div>${actionBtn}</div>`:''}
      </div>
      <!-- Editable date fields -->
      <div style="display:grid;grid-template-columns:1fr 1fr${item.arrived?` 1fr`:'`'};gap:10px">
        <div class="fld" style="margin:0">
          <label class="fl">תאריך הזמנה</label>
          <input type="date" class="fi" value="${toISO(item.ordered)}"
            onchange="doUpPD('${pid(p)}','${item.id}','ordered',this.value)"
            style="font-size:28px;padding:6px 9px">
          ${!item.ordered&&!item.cancelled?`<div style="font-size:29px;color:#fbbf24;margin-top:2px">⚠ טרם הוזמן</div>`:''}
        </div>
        <div class="fld" style="margin:0">
          <label class="fl" style="color:${lateVsInstall?'#f87171':''}">אספקה צפויה ${lateVsInstall?'⚠':''}</label>
          <input type="date" class="fi" value="${toISO(item.expected)}"
            onchange="doUpPD('${pid(p)}','${item.id}','expected',this.value)"
            style="font-size:28px;padding:6px 9px;border-color:${lateVsInstall?'rgba(239,68,68,.5)':''}">
          ${!item.expected&&!item.cancelled?`<div style="font-size:29px;color:#f87171;margin-top:2px">⚠ חסר תאריך אספקה</div>`:''}
          ${lateVsInstall&&expDt&&installDt?`<div style="font-size:29px;color:#f87171;margin-top:2px">${diffD(p.installDate,item.expected)} ימים אחרי התקנה</div>`:''}
        </div>
        ${item.arrived?`<div class="fld" style="margin:0">
          <label class="fl" style="color:#4ade80">✓ הגיע בפועל</label>
          <input type="date" class="fi" value="${toISO(item.arrivedDate)}"
            onchange="doUpPD('${pid(p)}','${item.id}','arrivedDate',this.value)"
            style="font-size:28px;padding:6px 9px;border-color:rgba(34,197,94,.4)">
        </div>`:''}
      </div>
    </div>`;
  }).join('');
  return`<div style="display:flex;flex-direction:column;gap:8px">${rows}</div>`;
}

function renderArchive(){
  const done=S.projects.filter(p=>p.status==='הושלם'||p.cancelled);
  const sel=S.md._archiveSel||null;
  if(sel){
    const p=done.find(x=>pid(x)===sel);
    if(p)return renderArchiveDetail(p);
  }
  // KPIs
  const completed=done.filter(p=>p.status==='הושלם');
  const avgPlanDiff=completed.filter(p=>p.planStart&&p.planEnd&&p.actualPlanEnd)
    .map(p=>diffD(p.planEnd,p.actualPlanEnd)).reduce((a,b)=>a+b,0)/Math.max(1,completed.filter(p=>p.actualPlanEnd).length);
  const avgProdDiff=completed.filter(p=>p.prodStart&&p.prodEnd&&p.actualProdEnd)
    .map(p=>diffD(p.prodEnd,p.actualProdEnd)).reduce((a,b)=>a+b,0)/Math.max(1,completed.filter(p=>p.actualProdEnd).length);
  const onTime=completed.filter(p=>p.actualPlanEnd&&toD(p.actualPlanEnd)<=toD(p.planEnd)).length;

  return`<div class="main" style="max-width:100%">
    <div class="page-hdr">
      <div><div class="page-title">ארכיון פרויקטים</div><div class="page-sub">${done.length} פרויקטים מוגמרים</div></div>
    </div>
    <div class="kpi-grid" style="margin-bottom:18px">
      <div class="kpi green"><div class="kpi-v" style="color:#16a34a">${completed.length}</div><div class="kpi-l">הושלמו</div><div class="kpi-icon">✅</div></div>
      <div class="kpi blue"><div class="kpi-v" style="color:#2563eb">${onTime}</div><div class="kpi-l">בזמן (תכנון)</div><div class="kpi-icon">⏱</div></div>
      <div class="kpi ${avgPlanDiff>0?'red':'green'}"><div class="kpi-v" style="color:${avgPlanDiff>0?'#dc2626':'#16a34a'}">${Math.abs(Math.round(avgPlanDiff))}</div><div class="kpi-l">ממוצע חריגת תכנון (ימים)</div><div class="kpi-icon">📐</div></div>
      <div class="kpi ${avgProdDiff>0?'red':'green'}"><div class="kpi-v" style="color:${avgProdDiff>0?'#dc2626':'#16a34a'}">${Math.abs(Math.round(avgProdDiff))}</div><div class="kpi-l">ממוצע חריגת ייצור (ימים)</div><div class="kpi-icon">🏭</div></div>
    </div>
    <div class="card" style="overflow-x:auto">
    <table style="min-width:900px"><thead><tr>
      <th>לקוח</th><th>הזמנה</th><th>סוכן</th><th>התקנה</th>
      <th>חריגת תכנון</th><th>חריגת ייצור</th><th>בקרה</th><th>ציון</th>
    </tr></thead>
    <tbody>${done.length?done.map(p=>{
      const ag=getUser(p.agentId);
      const planDiff2=p.planEnd&&p.actualPlanEnd?diffD(p.planEnd,p.actualPlanEnd):null;
      const prodDiff2=p.prodEnd&&p.actualProdEnd?diffD(p.prodEnd,p.actualProdEnd):null;
      const followupDate=p.followupDate||( p.actualInstallDate?new Date(new Date(p.actualInstallDate).getTime()+60*24*3600*1000).toISOString():null);
      const followupDone=p.followupDone||false;
      const followupOverdue=followupDate&&!followupDone&&toD(followupDate)<TODAY;
      // Score 0-100
      let score=100;
      if(planDiff2&&planDiff2>0)score-=Math.min(30,planDiff2*2);
      if(prodDiff2&&prodDiff2>0)score-=Math.min(30,prodDiff2*2);
      const procIssues=(p.procurement||[]).filter(i=>!i.cancelled&&!i.arrived).length;
      score-=procIssues*5;
      score=Math.max(0,Math.round(score));
      const scoreCol=score>=80?'#16a34a':score>=60?'#d97706':'#dc2626';
      return`<tr class="row" onclick="S.md._archiveSel='${pid(p)}';render()">
        <td style="font-weight:600">${p.client||'—'}</td>
        <td class="mono" style="color:var(--t3)">${p.orderNum||'—'}</td>
        <td style="font-size:12px">${ag?.name||'—'}</td>
        <td class="mono">${fmtD(p.actualInstallDate||p.installDate)}</td>
        <td>${planDiff2!==null?`<span class="diff-chip ${planDiff2>0?'diff-pos':planDiff2<0?'diff-neg':'diff-zero'}">${planDiff2>0?'+'+planDiff2:planDiff2} י'</span>`:'<span style="color:var(--t4)">—</span>'}</td>
        <td>${prodDiff2!==null?`<span class="diff-chip ${prodDiff2>0?'diff-pos':prodDiff2<0?'diff-neg':'diff-zero'}">${prodDiff2>0?'+'+prodDiff2:prodDiff2} י'</span>`:'<span style="color:var(--t4)">—</span>'}</td>
        <td>${followupDone
          ?`<span class="bdg bg" style="font-size:10px">✓ בוצעה</span>`
          :followupOverdue
            ?`<span class="bdg br" style="font-size:10px">⚠ ${fmtD(followupDate)}</span>`
            :followupDate
              ?`<span class="bdg bam" style="font-size:10px">📅 ${fmtD(followupDate)}</span>`
              :'<span style="color:var(--t4);font-size:11px">—</span>'
        }</td>
        <td><span style="font-weight:700;color:${scoreCol};font-family:'IBM Plex Mono',monospace">${score}</span></td>
      </tr>`;}).join(''):`<tr><td colspan="8" style="text-align:center;padding:40px"><div style="font-size:28px;opacity:.4">📦</div><div style="color:var(--t3)">אין פרויקטים מוגמרים</div></td></tr>`}
    </tbody></table></div>
  </div>`;
}

function renderArchiveDetail(p){
  const ag=getUser(p.agentId),eng=getUser(p.engineerId),pm2=getUser(p.prodManagerId);
  const planDiff2=p.planEnd&&p.actualPlanEnd?diffD(p.planEnd,p.actualPlanEnd):null;
  const prodDiff2=p.prodEnd&&p.actualProdEnd?diffD(p.prodEnd,p.actualProdEnd):null;
  const planDays=p.planStart&&p.planEnd?diffD(p.planStart,p.planEnd):null;
  const planActDays=p.planStart&&p.actualPlanEnd?diffD(p.planStart,p.actualPlanEnd):null;
  const prodDays=p.prodStart&&p.prodEnd?diffD(p.prodStart,p.prodEnd):null;
  const prodActDays=p.prodStart&&p.actualProdEnd?diffD(p.prodStart,p.actualProdEnd):null;
  const followupDate=p.followupDate||(p.actualInstallDate?new Date(new Date(p.actualInstallDate).getTime()+60*24*3600*1000).toISOString():null);
  const followupDone=p.followupDone||false;
  const followupConfirm=S.md._followupConfirm||false;
  const tasks=p.archiveTasks||[];

  // Mini gantt bars
  const allDates=[p.planStart,p.planEnd,p.prodStart,p.prodEnd,p.actualInstallDate||p.installDate].filter(Boolean);
  const minD=toD(allDates.reduce((a,b)=>a<b?a:b));
  const maxD=toD(allDates.reduce((a,b)=>a>b?a:b));
  const totalDays2=maxD&&minD?Math.max(1,diffD(minD.toISOString(),maxD.toISOString())+7):1;
  const barPct=(d,from)=>Math.max(0,Math.min(100,diffD(from.toISOString(),d)*100/totalDays2));
  const barW=(d1,d2)=>Math.max(1,Math.min(100,diffD(d1,d2)*100/totalDays2));

  const ganttRow=(label,start,end,color,actualEnd)=>{
    if(!start)return'';
    const l2=barPct(start,minD),w=barW(start,end||start);
    const al=actualEnd?barPct(actualEnd,minD):null;
    const aw=actualEnd&&start?barW(start,actualEnd):null;
    return`<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
      <div style="width:80px;font-size:11px;color:var(--t3);text-align:left;flex-shrink:0">${label}</div>
      <div style="flex:1;height:20px;background:var(--bg3);border-radius:3px;position:relative;overflow:visible">
        <div style="position:absolute;left:${l2}%;width:${w}%;height:100%;background:${color}44;border:1px solid ${color};border-radius:3px;min-width:3px"></div>
        ${al!==null?`<div style="position:absolute;left:${al}%;width:${aw}%;height:100%;background:${color};border-radius:3px;opacity:.7;min-width:3px"></div>`:''}
      </div>
    </div>`;
  };

  return`<div class="main" style="max-width:100%">
    <div class="page-hdr">
      <button class="btn sec" onclick="S.md._archiveSel=null;render()">← חזור לארכיון</button>
    </div>

    <!-- Header card -->
    <div class="card" style="margin-bottom:14px;padding:20px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:16px">
        <div>
          <div style="font-size:20px;font-weight:700">${p.client}</div>
          <div style="color:var(--t3);font-size:13px">${p.projectName||''} · ${p.orderNum||''} · ${p.projectType||''}</div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${sbdg(p)}
          ${p.cancelled?bdg('br','בוטל'):''}
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
        ${[['סוכן',ag?.name||'—'],['מתכנן',eng?.name||'—'],['מנהל ייצור',pm2?.name||'—'],['התקנה',fmtD(p.actualInstallDate||p.installDate)]].map(([l,v])=>`
          <div style="background:var(--bg3);border-radius:var(--r8);padding:10px;border:1px solid var(--b)">
            <div style="font-size:10px;color:var(--t3);margin-bottom:3px">${l}</div>
            <div style="font-weight:600;font-size:13px">${v}</div>
          </div>`).join('')}
      </div>
    </div>

    <!-- Performance card -->
    <div class="card" style="margin-bottom:14px;padding:20px">
      <div class="card-hdr-title" style="margin-bottom:14px">📊 ביצועים מול תכנון</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
        <div>
          <div style="font-size:11px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">תכנון הנדסי</div>
          <table style="width:100%;font-size:12px"><tbody>
            <tr><td style="color:var(--t3);padding:3px 0">מתוכנן</td><td style="font-weight:600;text-align:left">${planDays||'—'} ימים</td></tr>
            <tr><td style="color:var(--t3);padding:3px 0">בפועל</td><td style="font-weight:600;text-align:left">${planActDays||'—'} ימים</td></tr>
            <tr><td style="color:var(--t3);padding:3px 0">חריגה</td><td style="text-align:left">${planDiff2!==null?`<span class="diff-chip ${planDiff2>0?'diff-pos':planDiff2<0?'diff-neg':'diff-zero'}">${planDiff2>0?'+'+planDiff2:planDiff2} ימים</span>`:'—'}</td></tr>
          </tbody></table>
        </div>
        <div>
          <div style="font-size:11px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">ייצור</div>
          <table style="width:100%;font-size:12px"><tbody>
            <tr><td style="color:var(--t3);padding:3px 0">מתוכנן</td><td style="font-weight:600;text-align:left">${prodDays||'—'} ימים</td></tr>
            <tr><td style="color:var(--t3);padding:3px 0">בפועל</td><td style="font-weight:600;text-align:left">${prodActDays||'—'} ימים</td></tr>
            <tr><td style="color:var(--t3);padding:3px 0">חריגה</td><td style="text-align:left">${prodDiff2!==null?`<span class="diff-chip ${prodDiff2>0?'diff-pos':prodDiff2<0?'diff-neg':'diff-zero'}">${prodDiff2>0?'+'+prodDiff2:prodDiff2} ימים</span>`:'—'}</td></tr>
          </tbody></table>
        </div>
      </div>
      <!-- Mini Gantt -->
      <div style="font-size:11px;color:var(--t3);margin-bottom:8px;font-weight:600">ציר זמן (כחול=מתוכנן, מלא=בפועל)</div>
      ${ganttRow('תכנון',p.planStart,p.planEnd,'#2563eb',p.actualPlanEnd)}
      ${ganttRow('ייצור',p.prodStart,p.prodEnd,'#d97706',p.actualProdEnd)}
      ${ganttRow('התקנה',p.installDate,p.installDate,'#16a34a',p.actualInstallDate)}
    </div>

    <!-- Procurement card -->
    <div class="card" style="margin-bottom:14px;padding:20px">
      <div class="card-hdr-title" style="margin-bottom:12px">📦 רכש</div>
      ${(p.procurement||[]).length===0?`<div style="color:var(--t3);font-size:12px">אין אביזרי רכש</div>`:''}
      ${(p.procurement||[]).map(item=>{
        const expDt=toD(item.expected),arrDt=toD(item.arrivedDate);
        const delay=expDt&&arrDt?diffD(item.expected,item.arrivedDate):null;
        return`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bg3);border-radius:var(--r6);margin-bottom:6px;border:1px solid var(--b)">
          <div>
            <span style="font-weight:600;font-size:12px">${item.name}</span>
            ${item.ordered?`<span style="font-size:11px;color:var(--t3);margin-right:8px">הוזמן: ${fmtD(item.ordered)}</span>`:''}
            ${item.expected?`<span style="font-size:11px;color:var(--t3)">אספקה: ${fmtD(item.expected)}</span>`:''}
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            ${item.arrived?`<span class="bdg bg" style="font-size:10px">✓ הגיע ${fmtD(item.arrivedDate)}</span>`:`<span class="bdg br" style="font-size:10px">לא הגיע</span>`}
            ${delay!==null?`<span class="diff-chip ${delay>0?'diff-pos':delay<0?'diff-neg':'diff-zero'}" style="font-size:10px">${delay>0?'+'+delay:delay} י</span>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>

    <!-- Follow-up card -->
    <div class="card" style="margin-bottom:14px;padding:20px">
      <div class="card-hdr-title" style="margin-bottom:12px">🔍 בקרה לאחר התקנה</div>
      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:12px">
        <div>
          <div style="font-size:11px;color:var(--t3);margin-bottom:3px">תאריך בקרה נדרש (חודשיים מהתקנה)</div>
          <div style="font-weight:600;font-size:14px;color:${!followupDone&&followupDate&&toD(followupDate)<TODAY?'#dc2626':'var(--t)'}">${fmtD(followupDate)||'—'}</div>
        </div>
        <div>
          ${followupDone
            ?`<span class="bdg bg">✓ בוצעה ${fmtD(p.followupDoneDate)}</span>`
            :!followupConfirm
              ?`<button class="btn pri sm" onclick="S.md._followupConfirm=true;render()">✓ סמן בוצעה</button>`
              :`<div style="display:flex;align-items:center;gap:8px">
                  <span style="font-size:12px">לאשר?</span>
                  <button class="btn xs sec" onclick="S.md._followupConfirm=false;render()">לא</button>
                  <button class="btn xs pri" onclick="doMarkFollowup('${pid(p)}')">✓ כן</button>
                </div>`}
        </div>
        <button class="btn sm sec" onclick="doSendFollowupReminder('${pid(p)}')" style="margin-right:auto">📧 שלח תזכורת</button>
      </div>
      <div class="fld">
        <label class="fl">תאריך בקרה מותאם אישית</label>
        <input type="date" class="fi" style="max-width:200px" value="${toISO(p.followupDate||followupDate)}"
          onchange="doUpDate('${pid(p)}','followupDate',this.value)">
      </div>
    </div>

    <!-- Notes card -->
    <div class="card" style="margin-bottom:14px;padding:20px">
      <div class="card-hdr-title" style="margin-bottom:12px">📝 הערות ולקחים</div>
      ${(p.notes||[]).slice().reverse().map(n=>`<div class="note"><div class="note-meta"><span class="note-user">${n.user}</span><span class="note-date">${fmtD(n.date)}</span></div><div class="note-text">${n.text}</div></div>`).join('')}
      <div style="display:flex;gap:8px;margin-top:10px">
        <input class="fi" id="arch_note" placeholder="הוסף לקח / הערה..." style="flex:1">
        <button class="btn pri" onclick="doArchiveNote('${pid(p)}')">הוסף</button>
      </div>
    </div>

    <!-- Tasks card -->
    <div class="card" style="padding:20px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="card-hdr-title">✅ משימות המשך</div>
        <button class="btn sm pri" onclick="doAddArchiveTask('${pid(p)}')">+ משימה</button>
      </div>
      ${tasks.length===0?`<div style="color:var(--t3);font-size:12px;padding:8px 0">אין משימות — לחץ "+ משימה" להוספה</div>`:''}
      ${tasks.map((task,ti)=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg3);border-radius:var(--r6);margin-bottom:6px;border:1px solid var(--b);flex-wrap:wrap">
        <input type="checkbox" ${task.done?'checked':''} onchange="doToggleArchiveTask('${pid(p)}','${task.id}')" style="width:16px;height:16px;cursor:pointer;flex-shrink:0">
        <div style="flex:1;min-width:120px">
          <div style="font-size:12px;font-weight:500;${task.done?'text-decoration:line-through;color:var(--t3)':''}">${task.text}</div>
          ${task.due?`<div style="font-size:10px;color:${!task.done&&toD(task.due)<TODAY?'#dc2626':'var(--t3)'}">${fmtD(task.due)}</div>`:''}
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <select class="fi" style="font-size:11px;padding:3px 6px;width:auto" onchange="doUpArchiveTask('${pid(p)}','${task.id}','assignee',this.value)">
            <option value="">אחראי...</option>
            ${S.users.map(u=>`<option value="${u.id}" ${task.assignee===u.id?'selected':''}>${u.name}</option>`).join('')}
          </select>
          <span class="bdg ${task.done?'bg':toD(task.due)&&toD(task.due)<TODAY?'br':'bam'}" style="font-size:9px">${task.done?'הושלם':toD(task.due)&&toD(task.due)<TODAY?'באיחור':'פתוח'}</span>
          <button class="btn xs" style="color:#dc2626" onclick="doDelArchiveTask('${pid(p)}','${task.id}')">✕</button>
        </div>
      </div>`).join('')}
    </div>
  </div>`;
}

// Archive action functions
async function doMarkFollowup(id){
  upProj(id,{followupDone:true,followupDoneDate:new Date().toISOString()});
  S.md._followupConfirm=false;
  await logAction('add_note','בקרה לאחר התקנה בוצעה');
  render();
}
async function doSendFollowupReminder(id){
  const p=S.projects.find(x=>pid(x)===id);if(!p)return;
  const ag=getUser(p.agentId);
  if(ag?.email){
    await sendMail(ag.name,ag.email,'📅 תזכורת בקרה לאחר התקנה',
      `שלום ${ag.name},\n\nנדרשת בקרת ביצועי מערכת אצל הלקוח ${p.client||''} (${p.orderNum||''}).\nתאריך נדרש: ${fmtD(p.followupDate||'')}\n\nאנא תאם ביקור בקרה עם הלקוח.`,
      p.client||'');
  }
  alert('תזכורת נשלחה ל-'+ag?.name);
}
async function doArchiveNote(id){
  const inp=document.getElementById('arch_note');
  const txt=inp?.value?.trim();if(!txt)return;
  const p=S.projects.find(x=>pid(x)===id);if(!p)return;
  const note={user:cu()?.name||'',text:txt,date:new Date().toISOString()};
  upProj(id,{notes:[...(p.notes||[]),note]});
  if(inp)inp.value='';
  await logAction('add_note',`${p.client||''} — לקח: ${txt.slice(0,40)}`);
  render();
}
function doAddArchiveTask(id){
  const text=prompt('תיאור המשימה:');if(!text)return;
  const due=prompt('תאריך יעד (YYYY-MM-DD):');
  const p=S.projects.find(x=>pid(x)===id);if(!p)return;
  const tasks=[...(p.archiveTasks||[]),{id:'t'+Date.now(),text,due:due||'',assignee:'',done:false}];
  upProj(id,{archiveTasks:tasks});render();
}
function doToggleArchiveTask(id,tid){
  const p=S.projects.find(x=>pid(x)===id);if(!p)return;
  const tasks=(p.archiveTasks||[]).map(t=>t.id===tid?{...t,done:!t.done}:t);
  upProj(id,{archiveTasks:tasks});render();
}
function doUpArchiveTask(id,tid,key,val){
  const p=S.projects.find(x=>pid(x)===id);if(!p)return;
  const tasks=(p.archiveTasks||[]).map(t=>t.id===tid?{...t,[key]:val}:t);
  upProj(id,{archiveTasks:tasks});
}
function doDelArchiveTask(id,tid){
  const p=S.projects.find(x=>pid(x)===id);if(!p)return;
  upProj(id,{archiveTasks:(p.archiveTasks||[]).filter(t=>t.id!==tid)});render();
}


async function saveBrevoKey(){
  const key=document.getElementById('brevo_key_inp')?.value?.trim();
  if(!key){alert('נא להכניס API Key');return;}
  try{
    await setDoc(doc(db,'settings','main'),{brevoKey:key},{merge:true});
    S.settings=S.settings||{};
    S.settings.brevoKey=key;
    BREVO_API_KEY=key;
    await logAction('add_note','Brevo API Key עודכן');
    alert('✓ API Key נשמר ב-Firebase');
  }catch(e){
    alert('שגיאה בשמירה: '+e.message);
  }
}

async function testBrevoKey(){
  const key=document.getElementById('brevo_key_inp')?.value?.trim();
  if(!key){alert('נא להכניס API Key קודם');return;}
  const oldKey=BREVO_API_KEY;
  BREVO_API_KEY=key;
  await sendMail(cu()?.name||'בדיקה', cu()?.email||'mickey@sinun.co.il',
    '🧪 בדיקת מייל','זהו מייל בדיקה מ-ProjectFlow. אם קיבלת אותו — הכל עובד!','בדיקה');
  BREVO_API_KEY=oldKey;
  alert('נשלח! בדוק את תיבת הדואר שלך');
